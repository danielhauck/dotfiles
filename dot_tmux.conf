# Night Owl Tmux Configuration

set -g prefix C-a
unbind C-b

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -sg escape-time 0

set -g base-index 1
setw -g pane-base-index 1

set -g mouse on

bind a send-prefix
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind % split-window -c "#{pane_current_path}" -h
bind '"' split-window -c "#{pane_current_path}" -v
bind c new-window -c "#{pane_current_path}"

bind -n C-w choose-tree -Zs

setw -g monitor-activity on
set -g visual-activity off

# -- Status bar --
set -g status on
set -g status-interval 1
set -g status-position top
set -g status-left-length 40

# Transparent status bar, muted text
set -g status-style bg=#011627,fg=#d6deeb
set -g status-left "#[fg=#ffffff,bold] #S #[fg=#d6deeb]│"
set -g status-right "#[fg=#d6deeb]│ #[fg=#ffffff]%a %m/%d %H:%M "

# Inactive windows (show yellow asterisk if activity)
setw -g window-status-style bg=default,fg=#d6deeb
setw -g window-status-format "  #I  #W#{?window_activity_flag, #[fg=colour226,bold]*, } "

# Active window: bright white, bold, underlined
setw -g window-status-current-style bg=default,fg=#ffffff,bold,underscore
setw -g window-status-current-format "  #I  #W "

# Activity: yellow-green asterisk on changed windows
setw -g window-status-activity-style bg=default,fg=#d6deeb
setw -g window-status-bell-style bg=default,fg=#d6deeb

# Pane borders
set -g pane-border-style fg=#1d3b53
set -g pane-active-border-style fg=#82aaff

# Messages and mode
set -g message-style bg=#1d3b53,fg=#d6deeb
set -g message-command-style bg=#1d3b53,fg=#d6deeb
set -g mode-style bg=#1d3b53,fg=#d6deeb
